<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פיד חדשות</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Heebo',sans-serif;background:#0d0f14;color:#e0e0e0;min-height:100vh;direction:rtl}

#header{background:#13161e;border-bottom:1px solid #22252f;padding:0 18px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
#logo{font-size:21px;font-weight:800;color:#fff}
#logo span{color:#4e8ef7}
#status{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:5px 14px}
#sdot{width:7px;height:7px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.4)}50%{box-shadow:0 0 0 4px rgba(34,197,94,0)}}
#stxt{font-size:12px;color:rgba(255,255,255,.5);font-weight:500}

#filter-bar{background:#13161e;border-bottom:1px solid #22252f;padding:10px 18px;display:flex;gap:8px;flex-wrap:wrap;position:sticky;top:52px;z-index:90;overflow-x:auto}
.chip{padding:6px 16px;border-radius:20px;border:1px solid #2a2d38;background:transparent;font-size:13px;font-weight:600;cursor:pointer;color:#555;font-family:'Heebo',sans-serif;transition:all .12s;white-space:nowrap;flex-shrink:0}
.chip:hover{color:#bbb;border-color:#3a3d4a}
.chip.active{background:rgba(78,142,247,.15);border-color:#4e8ef7;color:#7eb8ff}

#feed{max-width:700px;margin:0 auto;padding:16px 14px 80px;display:flex;flex-direction:column;gap:10px}

.card{background:#171a22;border:1px solid #22252f;border-radius:14px;overflow:hidden;cursor:pointer;transition:border-color .15s,transform .15s;text-decoration:none;display:block}
.card:hover{border-color:#4e8ef7;transform:translateY(-2px)}
.card-body{padding:15px 17px}
.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.card-channel{font-size:12px;font-weight:700;color:#4e8ef7;background:rgba(78,142,247,.1);padding:3px 10px;border-radius:10px}
.card-time{font-size:11px;color:#444}
.card-title{font-size:16px;color:#ddd;line-height:1.6;font-weight:500}
.card-link{font-size:12px;color:#444;margin-top:8px;display:flex;align-items:center;gap:4px}
.card-link svg{width:11px;height:11px;flex-shrink:0}

#loading{text-align:center;padding:4rem 1rem;color:#444;font-size:15px}
.spinner{width:30px;height:30px;border:2.5px solid #22252f;border-top-color:#4e8ef7;border-radius:50%;animation:spin .65s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
#empty{display:none;text-align:center;padding:4rem;color:#444;font-size:15px}

#scroll-btn{display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#13161e;color:#aaa;border:1px solid #22252f;padding:9px 20px;border-radius:10px;font-size:13px;font-weight:600;font-family:'Heebo',sans-serif;cursor:pointer;z-index:80;box-shadow:0 4px 20px rgba(0,0,0,.3);align-items:center;gap:7px;white-space:nowrap}
#scroll-btn.show{display:flex}
#scroll-btn:hover{background:#4e8ef7;color:#fff;border-color:#4e8ef7}

#refresh-btn{position:fixed;bottom:24px;left:calc(50% + 120px);transform:translateX(-50%);background:#13161e;color:#aaa;border:1px solid #22252f;padding:9px 16px;border-radius:10px;font-size:13px;font-weight:600;font-family:'Heebo',sans-serif;cursor:pointer;z-index:80;display:flex;align-items:center;gap:6px}
#refresh-btn:hover{border-color:#4e8ef7;color:#7eb8ff}
</style>
</head>
<body>

<div id="header">
  <div id="logo">פיד<span>.</span>חדשות</div>
  <div id="status">
    <span id="sdot"></span>
    <span id="stxt">טוען...</span>
  </div>
</div>

<div id="filter-bar">
  <button class="chip active" data-ch="all" onclick="setFilter('all',this)">הכל</button>
</div>

<div id="feed">
  <div id="loading"><div class="spinner"></div>טוען חדשות...</div>
  <div id="empty">אין חדשות להצגה</div>
</div>

<button id="scroll-btn" onclick="window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'})">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="14" height="14"><polyline points="6 9 12 15 18 9"/></svg>
  גלול למטה
</button>

<button id="refresh-btn" onclick="load()">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
  רענן
</button>

<script>
const SHEET_ID = '1sbY4tBfW_apEstHeI92iG0IsBQ3OjYZWUaH90B0h0AA';
const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&tqx=responseHandler:_cb`;

let all=[], active='all';

window._cb = function(json){
  try{
    const rows = json.table.rows || [];
    all = [];
    rows.forEach(r => {
      const channel = r.c[0]?.v || '';
      const title   = r.c[1]?.v || '';
      const link    = r.c[2]?.v || '';
      if(title && title !== 'text' && channel !== 'channel') {
        all.push({channel: channel||'Ynet', title, link});
      }
    });
    updateChips();
    render();
    setStatus('מחובר ✓', true);
  } catch(e) {
    setStatus('שגיאה בטעינה', false);
  }
};

function load(){
  const old = document.getElementById('_s');
  if(old) old.remove();
  const s = document.createElement('script');
  s.id = '_s';
  s.src = URL + '&_=' + Date.now();
  document.head.appendChild(s);
}

function filtered(){
  return active==='all' ? all : all.filter(m=>m.channel===active);
}

function updateChips(){
  const bar = document.getElementById('filter-bar');
  const chs = [...new Set(all.map(m=>m.channel).filter(Boolean))];
  const ex  = new Set([...bar.querySelectorAll('.chip')].map(b=>b.dataset.ch));
  chs.forEach(ch => {
    if(ex.has(ch)) return;
    const b = document.createElement('button');
    b.className='chip'; b.dataset.ch=ch; b.textContent=ch;
    b.onclick=()=>setFilter(ch,b);
    bar.appendChild(b);
  });
}

function setFilter(ch, btn){
  active = ch;
  document.querySelectorAll('.chip').forEach(b=>b.classList.toggle('active', b.dataset.ch===ch));
  render();
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }

function render(){
  const feed = document.getElementById('feed');
  document.getElementById('loading').style.display = 'none';
  const msgs = filtered();
  feed.querySelectorAll('.card').forEach(e=>e.remove());

  if(!msgs.length){
    document.getElementById('empty').style.display='block';
    return;
  }
  document.getElementById('empty').style.display='none';

  const frag = document.createDocumentFragment();
  msgs.forEach(m => {
    const a = document.createElement('a');
    a.className = 'card';
    a.href = m.link || '#';
    a.target = '_blank';
    a.rel = 'noopener';
    a.innerHTML = `
      <div class="card-body">
        <div class="card-top">
          <span class="card-channel">${esc(m.channel)}</span>
        </div>
        <div class="card-title">${esc(m.title)}</div>
        ${m.link ? `<div class="card-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>פתח כתבה</div>` : ''}
      </div>`;
    frag.appendChild(a);
  });
  feed.appendChild(frag);
}

function setStatus(msg, ok){
  document.getElementById('stxt').textContent = msg;
  document.getElementById('sdot').style.background = ok ? '#22c55e' : '#e53935';
}

window.addEventListener('scroll', ()=>{
  const up = window.scrollY < document.body.scrollHeight - window.innerHeight - 100;
  document.getElementById('scroll-btn').classList.toggle('show', up);
}, {passive:true});

load();
setInterval(load, 60000);
</script>
</body>
</html>
